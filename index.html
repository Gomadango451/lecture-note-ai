<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>講義ノートAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --text-muted: #888899;
      --success: #4ade80;
      --error: #f87171;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    /* ── ヘッダー ── */
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: var(--accent2);
      letter-spacing: -0.5px;
    }
    header p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 6px;
    }

    /* ── カード ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 0.75rem;
      font-family: 'Space Mono', monospace;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* ── APIキーセクション ── */
    #api-key-section details summary {
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-muted);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #api-key-section details summary::before {
      content: '▶';
      font-size: 0.6rem;
      transition: transform 0.2s;
    }
    #api-key-section details[open] summary::before {
      transform: rotate(90deg);
    }
    #api-key-section details[open] summary {
      margin-bottom: 12px;
    }
    #api-key-saved-msg {
      font-size: 0.78rem;
      color: var(--success);
      margin-left: 8px;
    }

    /* ── 入力共通 ── */
    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    input:focus { border-color: var(--accent); }

    /* ── ファイル選択 ── */
    .file-label {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .file-label:hover { border-color: var(--accent); background: #1e1e26; }
    .file-label .icon { font-size: 1.6rem; }
    .file-label .file-text { font-size: 0.85rem; color: var(--text-muted); }
    .file-label .file-name { font-size: 0.85rem; color: var(--accent2); font-weight: 500; }
    input[type="file"] { display: none; }

    /* ── 実行ボタン ── */
    #run-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    #run-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── ローディング ── */
    #loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── エラー ── */
    #error-msg {
      display: none;
      background: #2a1515;
      border: 1px solid #5a2020;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: var(--error);
      margin-top: 8px;
    }

    /* ── 結果エリア ── */
    .result-card { display: none; }
    .result-content {
      background: var(--surface2);
      border-radius: 8px;
      padding: 14px;
      font-size: 0.88rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
    }
    .copy-btn {
      margin-top: 10px;
      padding: 7px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .copy-btn.copied { border-color: var(--success); color: var(--success); }

    /* ── スクロールバー ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

  <header>
    <h1>🎙 講義ノートAI</h1>
    <p>音声を入れると、文字起こし・要約・要点を自動生成します</p>
  </header>

  <!-- APIキー -->
  <div class="card" id="api-key-section">
    <div class="card-title">API Key</div>
    <details id="api-key-details">
      <summary>
        Gemini APIキーを設定する
        <span id="api-key-saved-msg"></span>
      </summary>
      <input type="password" id="api-key-input" placeholder="AIza..." />
      <button onclick="saveApiKey()" style="margin-top:10px; padding:8px 16px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:0.85rem;">保存</button>
    </details>
  </div>

  <!-- 講義名 -->
  <div class="card">
    <div class="card-title">講義名（任意）</div>
    <input type="text" id="lecture-name" placeholder="例：情報工学 第5回" />
  </div>

  <!-- 音声ファイル -->
  <div class="card">
    <div class="card-title">音声ファイル</div>
    <label class="file-label" for="audio-file">
      <span class="icon">🎵</span>
      <div>
        <div class="file-text">タップしてファイルを選択</div>
        <div class="file-name" id="file-name-display">mp3 / wav / m4a / ogg / flac 対応</div>
      </div>
    </label>
    <input type="file" id="audio-file" accept="audio/*" onchange="onFileSelect(this)" />
  </div>

  <!-- 実行ボタン -->
  <button id="run-btn" onclick="run()">文字起こし＆要約する ▶</button>

  <!-- エラー -->
  <div id="error-msg"></div>

  <!-- ローディング -->
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Gemini APIに送信中...</div>
  </div>

  <!-- 文字起こし結果 -->
  <div class="card result-card" id="transcript-card" style="margin-top:16px;">
    <div class="card-title">📝 文字起こし</div>
    <div class="result-content" id="transcript-result"></div>
    <button class="copy-btn" onclick="copyText('transcript-result', this)">コピー</button>
  </div>

  <!-- 要約結果 -->
  <div class="card result-card" id="summary-card">
    <div class="card-title">💡 要約 ＆ 要点</div>
    <div class="result-content" id="summary-result"></div>
    <button class="copy-btn" onclick="copyText('summary-result', this)">コピー</button>
  </div>

  <script>
    // ── APIキー管理 ──
    function saveApiKey() {
      const key = document.getElementById('api-key-input').value.trim();
      if (!key) return alert('APIキーを入力してください');
      localStorage.setItem('gemini_api_key', key);
      document.getElementById('api-key-saved-msg').textContent = '✓ 保存済み';
      document.getElementById('api-key-details').removeAttribute('open');
    }

    function loadApiKey() {
      const key = localStorage.getItem('gemini_api_key');
      if (key) {
        document.getElementById('api-key-input').value = key;
        document.getElementById('api-key-saved-msg').textContent = '✓ 保存済み';
      } else {
        document.getElementById('api-key-details').setAttribute('open', '');
      }
    }

    // ── ファイル選択 ──
    function onFileSelect(input) {
      const file = input.files[0];
      if (file) {
        document.getElementById('file-name-display').textContent = file.name;
      }
    }

    // ── Base64変換 ──
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ── UI制御 ──
    function setLoading(flag, text = 'Gemini APIに送信中...') {
      document.getElementById('loading').style.display = flag ? 'block' : 'none';
      document.getElementById('loading-text').textContent = text;
      document.getElementById('run-btn').disabled = flag;
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.style.display = 'block';
      el.textContent = msg;
    }

    function clearError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    function showResult(cardId, contentId, text) {
      document.getElementById(cardId).style.display = 'block';
      document.getElementById(contentId).textContent = text;
    }

    // ── コピー ──
    function copyText(elementId, btn) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ コピーしました';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'コピー';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // ── メイン処理 ──
    async function run() {
      clearError();

      const apiKey = localStorage.getItem('gemini_api_key');
      if (!apiKey) { showError('APIキーを設定してください'); document.getElementById('api-key-details').setAttribute('open',''); return; }

      const audioFile = document.getElementById('audio-file').files[0];
      if (!audioFile) { showError('音声ファイルを選択してください'); return; }

      // サイズチェック（20MB制限）
      if (audioFile.size > 20 * 1024 * 1024) {
        showError('ファイルが20MBを超えています。短い音声（30秒〜2分）でお試しください');
        return;
      }

      const lectureName = document.getElementById('lecture-name').value.trim();

      // 結果エリアをリセット
      document.querySelectorAll('.result-card').forEach(el => el.style.display = 'none');

      try {
        // ── STEP1: 文字起こし ──
        setLoading(true, '音声を文字起こし中...');
        const base64Audio = await fileToBase64(audioFile);
        const mimeType = audioFile.type || 'audio/mp3';

        const transcriptPrompt = lectureName
          ? `これは「${lectureName}」の講義音声です。この音声を日本語でそのまま文字起こしして、全文を出力してください。`
          : 'この音声を日本語でそのまま文字起こしして、全文を出力してください。';

        const transcriptRes = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [
                  { text: transcriptPrompt },
                  { inline_data: { mime_type: mimeType, data: base64Audio } }
                ]
              }]
            })
          }
        );

        if (!transcriptRes.ok) {
          const err = await transcriptRes.json();
          throw new Error(`文字起こし失敗 (${transcriptRes.status}): ${err.error?.message || '不明なエラー'}`);
        }

        const transcriptData = await transcriptRes.json();
        const transcript = transcriptData.candidates[0].content.parts[0].text;
        showResult('transcript-card', 'transcript-result', transcript);

        // ── STEP2: 要約＆要点 ──
        setLoading(true, '要約を生成中...');

        const summaryPrompt = `以下は講義の文字起こしです。\n\n${transcript}\n\n以下の形式で出力してください：\n\n【要約】\n3行以内で内容を簡潔にまとめる\n\n【要点】\n・（重要ポイント1）\n・（重要ポイント2）\n・（重要ポイント3）\n（最大5個まで）`;

        const summaryRes = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: summaryPrompt }] }]
            })
          }
        );

        if (!summaryRes.ok) {
          const err = await summaryRes.json();
          throw new Error(`要約失敗 (${summaryRes.status}): ${err.error?.message || '不明なエラー'}`);
        }

        const summaryData = await summaryRes.json();
        const summary = summaryData.candidates[0].content.parts[0].text;
        showResult('summary-card', 'summary-result', summary);

      } catch (e) {
        showError('エラーが発生しました：' + e.message);
      } finally {
        setLoading(false);
      }
    }

    // ── 初期化 ──
    loadApiKey();
  </script>
</body>
</html>
